<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Certificate Verification</title>

  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Google Font -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- AOS Animation -->

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;

      background:
      linear-gradient(
        135deg,
        #020617,
        #111827,
        #1e3a8a
      );

      min-height:100vh;

      overflow-x:hidden;

      position:relative;

    }

    #particles-js{

      position:fixed;

      width:100%;
      height:100%;

      top:0;
      left:0;

      z-index:0;

    }

    .main-container{

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      position:relative;

      z-index:2;

      padding:40px 20px;

    }

    .verify-card{

      width:100%;

      max-width:900px;

      background:rgba(15,23,42,0.75);

      border:2px solid rgba(250,204,21,0.35);

      backdrop-filter:blur(15px);

      border-radius:30px;

      padding:50px;

      color:white;

      box-shadow:0 20px 60px rgba(0,0,0,0.5);

      position:relative;

      overflow:hidden;

      animation:floatCard 4s ease-in-out infinite;

    }

    .verify-card::before{

      content:'';

      position:absolute;

      width:250px;
      height:250px;

      background:rgba(250,204,21,0.12);

      border-radius:50%;

      top:-80px;
      right:-80px;

    }

    .verify-card::after{

      content:'';

      position:absolute;

      inset:0;

      border-radius:30px;

      padding:2px;

      background:linear-gradient(
        45deg,
        #facc15,
        #2563eb,
        #22c55e,
        #facc15
      );

      background-size:400% 400%;

      animation:borderGlow 8s linear infinite;

      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

      -webkit-mask-composite:xor;

      pointer-events:none;

    }

    @keyframes borderGlow{

      0%{
        background-position:0% 50%;
      }

      50%{
        background-position:100% 50%;
      }

      100%{
        background-position:0% 50%;
      }

    }

    @keyframes floatCard{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    .loading-area{

      text-align:center;

      padding:80px 20px;

    }

    .logo{

      text-align:center;

      margin-bottom:20px;

    }

    .logo img{

      width:300px;

      max-width:95%;

      filter:drop-shadow(0 10px 25px rgba(250,204,21,0.4));

      animation:floatLogo 4s ease-in-out infinite;

    }

    @keyframes floatLogo{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    .title{

      text-align:center;

      font-size:48px;

      font-weight:800;

      margin-bottom:20px;

      background:linear-gradient(90deg,#ffffff,#facc15);

      -webkit-background-clip:text;

      -webkit-text-fill-color:transparent;

    }

    .verified-badge{

      width:150px;
      height:150px;

      background:linear-gradient(135deg,#22c55e,#16a34a);

      border-radius:50%;

      margin:30px auto;

      display:flex;

      align-items:center;

      justify-content:center;

      font-size:65px;

      color:white;

      box-shadow:0 10px 30px rgba(34,197,94,0.4);

      animation:pulse 2s infinite;

    }

    @keyframes pulse{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.08);
      }

      100%{
        transform:scale(1);
      }

    }

    .success{

      text-align:center;

      font-size:34px;

      font-weight:700;

      color:#facc15;

      margin-bottom:15px;

    }

    .subtitle{

      text-align:center;

      font-size:20px;

      color:#e2e8f0;

      margin-bottom:35px;

    }

    .details{

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:20px;

      margin-top:30px;

    }

    .detail-box{

      background:rgba(255,255,255,0.07);

      border:1px solid rgba(255,255,255,0.12);

      padding:22px;

      border-radius:18px;

      transition:0.3s;

    }

    .detail-box:hover{

      transform:translateY(-8px) scale(1.03);

      background:rgba(250,204,21,0.18);

      box-shadow:0 10px 30px rgba(250,204,21,0.25);

    }

    .detail-label{

      color:#facc15;

      font-size:15px;

      margin-bottom:8px;

      font-weight:600;

      text-transform:uppercase;

    }

    .detail-value{

      font-size:20px;

      font-weight:600;

      color:#ffffff;

      line-height:1.7;

    }

    .full-width{

      grid-column:1/-1;

    }

    .footer{

      margin-top:40px;

      text-align:center;

      color:#cbd5e1;

      line-height:1.8;

      font-size:17px;

    }

    .error{

      text-align:center;

      padding:50px;

    }

    .error h1{

      color:#ef4444;

      font-size:50px;

    }

    @media(max-width:768px){

      .verify-card{

        padding:30px 20px;

      }

      .title{

        font-size:32px;

      }

      .details{

        grid-template-columns:1fr;

      }

      .verified-badge{

        width:120px;
        height:120px;

        font-size:50px;

      }

      .logo img{

        width:220px;

      }

    }

  </style>

</head>

<body>

<div id="particles-js"></div>

<div class="main-container">

  <div class="verify-card" id="content">

    <div class="loading-area">

      <div class="spinner-border text-warning"
      style="width:4rem;height:4rem;">
      </div>

      <h2 class="mt-4">
        Loading Verification...
      </h2>

    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const studentId = params.get("id");

fetch("./students.json")

.then(response => response.json())

.then(data => {

    const student = data.find(
      s => s.id === studentId
    );

    if(student){

      document.getElementById("content").innerHTML = `

      <div class="logo" data-aos="zoom-in">

        <img src="logo.png" alt="Logo">

      </div>

      <h1 class="title">
        Certificate Verified
      </h1>

      <div class="verified-badge" data-aos="zoom-in">

        <i class="fa-solid fa-check"></i>

      </div>

      <div class="success">

        🎉 Congratulations 🎉

      </div>

      <div class="subtitle">

  <i>
    This certificate is digitally verified through the
    official verification portal of
    <b>Prasitha Engineering</b>.
  </i>

</div>

      <div class="details" data-aos="fade-up">

        <div class="detail-box">

          <div class="detail-label">
            Student Name
          </div>

          <div class="detail-value">
            ${student.name}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Certificate ID
          </div>

          <div class="detail-value">
            ${student.id}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Internship Course
          </div>

          <div class="detail-value">
            ${student.course}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Duration
          </div>

          <div class="detail-value">
            ${student.duration}
          </div>

        </div>

        <div class="detail-box full-width">

          <div class="detail-label">
            College Name
          </div>

          <div class="detail-value">
            ${student.college}
          </div>

        </div>

      </div>

      <div class="footer">

        <i class="fa-solid fa-shield-check text-warning"></i>

        This certificate has been digitally verified through
        the Prasitha Engineering Verification Portal.

      </div>

      `;

      AOS.refresh();

    }

    else{

      document.getElementById("content").innerHTML = `

      <div class="error">

        <h1>
          ❌
        </h1>

        <h2>
          Certificate Not Found
        </h2>

        <p class="mt-3">
          Invalid Student ID or certificate does not exist.
        </p>

      </div>

      `;

    }

})

.catch(error => {

  document.getElementById("content").innerHTML = `

  <div class="error">

    <h1>
      ⚠️
    </h1>

    <h2>
      Error Loading Data
    </h2>

    <p class="mt-3">
      Please check Database.
    </p>

  </div>

  `;

});

</script>

<!-- Particles -->

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js", {

  particles: {

    number: {
      value: 80
    },

    color: {
      value: "#facc15"
    },

    shape: {
      type: "circle"
    },

    opacity: {
      value: 0.5
    },

    size: {
      value: 3
    },

    move: {
      enable: true,
      speed: 2
    }

  }

});

</script>

<!-- AOS -->

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({

  duration:1200,

  once:true

});

</script>

</body>
</html>
