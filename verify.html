<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Certificate Verification</title>

  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Google Font -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;

      min-height:100vh;

      background:
      linear-gradient(135deg,#000000,#111827,#1e3a8a);

      overflow-x:hidden;

      display:flex;

      align-items:center;

      justify-content:center;

      padding:30px;

      position:relative;

    }

    body::before{

      content:'';

      position:absolute;

      width:500px;
      height:500px;

      background:rgba(250,204,21,0.25);

      border-radius:50%;

      top:-200px;
      left:-150px;

      filter:blur(80px);

    }

    body::after{

      content:'';

      position:absolute;

      width:400px;
      height:400px;

      background:rgba(37,99,235,0.3);

      border-radius:50%;

      bottom:-150px;
      right:-100px;

      filter:blur(80px);

    }

    .verify-card{

      width:100%;

      max-width:850px;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(15px);

      border-radius:30px;

      padding:50px;

      color:white;

      box-shadow:0 15px 40px rgba(0,0,0,0.4);

      position:relative;

      z-index:2;

      overflow:hidden;

    }

    .verify-card::before{

      content:'';

      position:absolute;

      width:250px;
      height:250px;

      background:rgba(250,204,21,0.12);

      border-radius:50%;

      top:-80px;
      right:-80px;

    }

    .logo{

      text-align:center;

      margin-bottom:20px;

    }

    .logo img{

      width:220px;

      max-width:90%;

      filter:drop-shadow(0 10px 20px rgba(250,204,21,0.4));

      animation:floatLogo 4s ease-in-out infinite;

    }

    @keyframes floatLogo{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    .title{

      text-align:center;

      font-size:42px;

      font-weight:800;

      margin-bottom:20px;

      background:linear-gradient(90deg,#ffffff,#facc15);

      -webkit-background-clip:text;

      -webkit-text-fill-color:transparent;

    }

    .verified-badge{

      width:150px;
      height:150px;

      background:linear-gradient(135deg,#22c55e,#16a34a);

      border-radius:50%;

      margin:30px auto;

      display:flex;

      align-items:center;

      justify-content:center;

      font-size:65px;

      color:white;

      box-shadow:0 10px 30px rgba(34,197,94,0.4);

      animation:pulse 2s infinite;

    }

    @keyframes pulse{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.08);
      }

      100%{
        transform:scale(1);
      }

    }

    .success{

      text-align:center;

      font-size:34px;

      font-weight:700;

      color:#facc15;

      margin-bottom:15px;

    }

    .subtitle{

      text-align:center;

      font-size:20px;

      color:#e2e8f0;

      margin-bottom:35px;

    }

    .details{

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:20px;

      margin-top:30px;

    }

    .detail-box{

      background:rgba(255,255,255,0.07);

      border:1px solid rgba(255,255,255,0.12);

      padding:22px;

      border-radius:18px;

      transition:0.3s;

    }

    .detail-box:hover{

      transform:translateY(-5px);

      background:rgba(250,204,21,0.15);

    }

    .detail-label{

      color:#facc15;

      font-size:15px;

      margin-bottom:8px;

      font-weight:600;

      text-transform:uppercase;

    }

    .detail-value{

      font-size:20px;

      font-weight:500;

      color:white;

    }

    .footer{

      margin-top:40px;

      text-align:center;

      color:#cbd5e1;

      line-height:1.8;

      font-size:17px;

    }

    .error{

      text-align:center;

      padding:50px;

    }

    .error h1{

      color:#ef4444;

      font-size:50px;

    }

    @media(max-width:768px){

      .verify-card{

        padding:30px 20px;

      }

      .title{

        font-size:30px;

      }

      .details{

        grid-template-columns:1fr;

      }

      .verified-badge{

        width:120px;
        height:120px;

        font-size:50px;

      }

    }

  </style>

</head>

<body>

<div class="verify-card" id="content">

  <div class="text-center">

    <div class="spinner-border text-warning"
    style="width:4rem;height:4rem;">
    </div>

    <h2 class="mt-4">
      Loading Verification...
    </h2>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const studentId = params.get("id");

fetch("./students.json")

.then(response => response.json())

.then(data => {

    const student = data.find(
      s => s.id === studentId
    );

    if(student){

      document.getElementById("content").innerHTML = `

      <div class="logo">

        <img src="logo.png" alt="Logo">

      </div>

      <h1 class="title">
        Certificate Verified
      </h1>

      <div class="verified-badge">

        <i class="fa-solid fa-check"></i>

      </div>

      <div class="success">

        🎉 Congratulations 🎉

      </div>

      <div class="subtitle">

        This internship certificate is officially verified
        by Prasitha Engineering.

      </div>

      <div class="details">

        <div class="detail-box">

          <div class="detail-label">
            Student Name
          </div>

          <div class="detail-value">
            ${student.name}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Roll Number
          </div>

          <div class="detail-value">
            ${student.id}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Internship Course
          </div>

          <div class="detail-value">
            ${student.course}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Duration
          </div>

          <div class="detail-value">
            ${student.duration}
          </div>

        </div>

        <div class="detail-box" style="grid-column:1/-1;">

          <div class="detail-label">
            College Name
          </div>

          <div class="detail-value">
            ${student.college}
          </div>

        </div>

      </div>

      <div class="footer">

        <i class="fa-solid fa-shield-check text-warning"></i>

        This certificate has been digitally verified through
        the Prasitha Engineering Verification Portal.

      </div>

      `;

    }

    else{

      document.getElementById("content").innerHTML = `

      <div class="error">

        <h1>
          ❌
        </h1>

        <h2>
          Certificate Not Found
        </h2>

        <p class="mt-3">
          Invalid Student ID or certificate does not exist.
        </p>

      </div>

      `;

    }

})

.catch(error => {

  document.getElementById("content").innerHTML = `

  <div class="error">

    <h1>
      ⚠️
    </h1>

    <h2>
      Error Loading Data
    </h2>

    <p class="mt-3">
      Please check students.json file.
    </p>

  </div>

  `;

});

</script>

</body>
</html><!DOCTYPE html>

  <style>

        <ul>

        <li>

        <div class="logo">

        <img src="logo.png" alt="Logo">

</body>
</html>
