<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Certificate Verification</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef3f8;
}

/* Header */

header{

background:linear-gradient(90deg,#003366,#0056b3);

color:white;

padding:18px 40px;

display:flex;

align-items:center;

justify-content:space-between;

box-shadow:0 3px 15px rgba(0,0,0,.2);

}

.logo{

display:flex;

align-items:center;

gap:15px;

}

.logo img{

height:60px;

}

.logo h2{

font-size:26px;

}

.subtitle{

font-size:14px;

opacity:.9;

}

/* Container */

.container{

width:95%;

max-width:1300px;

margin:25px auto;

}

/* Status */

.status{

background:white;

padding:18px;

border-radius:12px;

box-shadow:0 5px 18px rgba(0,0,0,.08);

display:flex;

justify-content:center;

align-items:center;

margin-bottom:25px;

}

.status span{

background:#27ae60;

color:white;

padding:10px 28px;

font-size:20px;

font-weight:bold;

border-radius:30px;

}

/* Grid */

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;

margin-bottom:25px;

}

/* Cards */

.card{

background:white;

border-radius:12px;

padding:22px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-4px);

}

.card h3{

color:#003366;

margin-bottom:18px;

border-bottom:2px solid #0056b3;

padding-bottom:10px;

}

.info{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px solid #eee;

}

.label{

font-weight:600;

color:#555;

}

.value{

font-weight:bold;

color:#222;

}

/* PDF */

.pdf{

background:white;

border-radius:12px;

padding:15px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.pdf h3{

color:#003366;

margin-bottom:15px;

}

iframe{

width:100%;

height:900px;

border:none;

border-radius:8px;

}

/* Footer */

footer{

margin-top:30px;

background:#003366;

color:white;

padding:18px;

text-align:center;

}

@media(max-width:768px){

iframe{

height:550px;

}

.logo h2{

font-size:20px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<div>

<h2>Prasitha Engineering & Tech Solutions</h2>

<div class="subtitle">

Certificate Verification Portal

</div>

</div>

</div>

</header>

<div class="container">

<div class="status">

<span>

<i class="fa-solid fa-circle-check"></i>

Certificate Verified

</span>

</div>

<div class="grid">

<div class="card">

<h3>

<i class="fa-solid fa-user"></i>

Student Details

</h3>

<div class="info">

<div class="label">Name</div>

<div class="value" id="name"></div>

</div>

<div class="info">

<div class="label">Certificate ID</div>

<div class="value" id="id"></div>

</div>

<div class="info">

<div class="label">College</div>

<div class="value" id="college"></div>

</div>

</div>

<div class="card">

<h3>

<i class="fa-solid fa-graduation-cap"></i>

Course Details

</h3>

<div class="info">

<div class="label">Course</div>

<div class="value" id="course"></div>

</div>

<div class="info">

<div class="label">Duration</div>

<div class="value" id="duration"></div>

</div>

<div class="info">

<div class="label">Percentage</div>

<div class="value" id="percentage"></div>

</div>

</div>

</div>

<div class="pdf">

<h3>

<i class="fa-solid fa-file-pdf"></i>

Certificate Preview

</h3>

<iframe id="viewer"></iframe>

</div>

</div>

<footer>

© 2021 Prasitha Engineering & Tech Solutions | Certificate Verification System

</footer>

<script>

const id=new URLSearchParams(window.location.search).get("id");

fetch("students.json")

.then(res=>res.json())

.then(data=>{

const s=data.find(x=>x.id===id);

if(!s){

document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>Certificate Not Found</h2>";

return;

}

document.getElementById("name").textContent=s.name;

document.getElementById("id").textContent=s.id;

document.getElementById("college").textContent=s.college;

document.getElementById("course").textContent=s.course;

document.getElementById("duration").textContent=s.duration;

document.getElementById("percentage").textContent=s.percentage;

document.getElementById("viewer").src=s.pdf;

});

</script>

</body>

</html>
